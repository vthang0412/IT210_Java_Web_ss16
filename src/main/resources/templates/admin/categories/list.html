<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quan ly danh muc</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="nav">
    <a href="/">Trang chu</a>
    <a href="/admin/dashboard">Dashboard</a>
    <a href="/admin/products">San pham</a>
    <a href="/admin/categories">Danh muc</a>
</div>

<main class="container">
    <h2>Quan ly danh muc</h2>

    <p th:if="${error}" class="error" th:text="${error}"></p>
    <p th:if="${success}" class="success" th:text="${success}"></p>

    <form class="search-form" method="post" action="/admin/categories/save">
        <input type="hidden" name="id" th:value="${category.id}">
        <input type="text" name="name" th:value="${category.name}" placeholder="Ten danh muc" required>
        <button type="submit" th:text="${category.id != null} ? 'Cap nhat' : 'Them moi'"></button>
        <a th:if="${category.id != null}" href="/admin/categories">Huy</a>
    </form>

    <table>
        <tr>
            <th>ID</th>
            <th>Ten</th>
            <th>Hanh dong</th>
        </tr>
        <tr th:each="cat : ${categories}">
            <td th:text="${cat.id}"></td>
            <td th:text="${cat.name}"></td>
            <td class="actions">
                <a class="btn btn-small btn-secondary" th:href="@{/admin/categories/edit/{id}(id=${cat.id})}">Sua</a>
                <form class="inline-form" method="post" th:action="@{/admin/categories/delete/{id}(id=${cat.id})}">
                    <button class="danger btn-small" type="submit" onclick="return confirm('Xoa danh muc nay?')">Xoa</button>
                </form>
            </td>
        </tr>
    </table>
</main>
</body>
</html>
