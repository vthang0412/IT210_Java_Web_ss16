<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quan ly san pham</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="nav">
    <a href="/">Trang chu</a>
    <a href="/admin/dashboard">Dashboard</a>
    <a href="/admin/products">San pham</a>
    <a href="/admin/categories">Danh muc</a>
</div>

<main class="container">
    <h2>Quan ly san pham</h2>

    <p th:if="${error}" class="error" th:text="${error}"></p>
    <p th:if="${success}" class="success" th:text="${success}"></p>

    <p><a class="btn" href="/admin/products/add">Them san pham</a></p>

    <table>
        <tr>
            <th>ID</th>
            <th>Ten</th>
            <th>Danh muc</th>
            <th>Gia</th>
            <th>Ton kho</th>
            <th>Hanh dong</th>
        </tr>
        <tr th:each="p : ${products}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.name}"></td>
            <td th:text="${p.category.name}"></td>
            <td th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')}"></td>
            <td th:text="${p.stockQuantity}"></td>
            <td class="actions">
                <a class="btn btn-small btn-secondary" th:href="@{/admin/products/edit/{id}(id=${p.id})}">Sua</a>
                <form class="inline-form" method="post" th:action="@{/admin/products/delete/{id}(id=${p.id})}">
                    <button class="danger btn-small" type="submit" onclick="return confirm('Xoa san pham nay?')">Xoa</button>
                </form>
            </td>
        </tr>
    </table>
</main>
</body>
</html>
