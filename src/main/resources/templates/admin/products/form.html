<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Form san pham</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="nav">
    <a href="/">Trang chu</a>
    <a href="/admin/dashboard">Dashboard</a>
    <a href="/admin/products">San pham</a>
    <a href="/admin/categories">Danh muc</a>
</div>

<main class="container">
    <h2 th:text="${product.id != null} ? 'Cap nhat san pham' : 'Them san pham'"></h2>

    <form class="form-box" method="post" action="/admin/products/save" th:object="${product}">
        <input type="hidden" th:field="*{id}">
        <div class="form-row">
            <label>Ten san pham</label>
            <input type="text" th:field="*{name}">
            <div class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>
        <div class="form-row">
            <label>Mo ta</label>
            <textarea th:field="*{description}"></textarea>
        </div>
        <div class="form-row">
            <label>Gia</label>
            <input type="number" step="0.01" min="0" th:field="*{price}">
            <div class="field-error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
        </div>
        <div class="form-row">
            <label>Ton kho</label>
            <input type="number" min="0" th:field="*{stockQuantity}">
            <div class="field-error" th:if="${#fields.hasErrors('stockQuantity')}" th:errors="*{stockQuantity}"></div>
        </div>
        <div class="form-row">
            <label>Image URL</label>
            <input type="text" th:field="*{imageUrl}">
        </div>
        <div class="form-row">
            <label>Danh muc</label>
            <select name="categoryId">
                <option value="">-- Chon danh muc --</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${product.category != null && product.category.id == cat.id}"></option>
            </select>
            <div class="field-error" th:if="${categoryError}" th:text="${categoryError}"></div>
        </div>
        <button type="submit">Luu</button>
    </form>
</main>
</body>
</html>
